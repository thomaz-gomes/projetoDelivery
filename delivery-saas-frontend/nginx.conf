server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy dynamic PWA manifest to backend (must be same-origin for install prompt)
  location ~ ^/pwa-manifest/ {
    rewrite ^/pwa-manifest/(.*)$ /public/$1/manifest.json break;
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Proxy API requests to backend (same Docker network)
  # Use Host "localhost" so the backend's customDomainResolver middleware
  # does NOT intercept/rewrite these API calls when the SPA is served
  # from a custom domain (e.g. www.almocaidelivery.com.br)
  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_set_header Host localhost;
    proxy_set_header X-Original-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  error_page  404 /index.html;
}
