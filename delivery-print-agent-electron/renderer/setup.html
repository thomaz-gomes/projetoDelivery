<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
<title>Delivery Print Agent — Configuração</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .card {
    background: #16213e; border-radius: 12px; padding: 32px;
    width: 100%; max-width: 460px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo-icon { font-size: 40px; display: block; margin-bottom: 8px; }
  .logo h1 { font-size: 20px; color: #4ecca3; font-weight: 700; }
  .logo p  { font-size: 13px; color: #888; margin-top: 4px; }

  .field { margin-bottom: 18px; }
  label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
  label .optional { color: #555; font-size: 11px; margin-left: 4px; }

  input[type="text"] {
    width: 100%; padding: 10px 12px;
    background: #0f3460; border: 1px solid #1a4a8a;
    border-radius: 6px; color: #fff; font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  input[type="text"]:focus { border-color: #4ecca3; }

  .code-input {
    font-family: 'Consolas', monospace !important;
    font-size: 26px !important; font-weight: 700 !important;
    letter-spacing: 10px; text-align: center;
    text-transform: uppercase; color: #4ecca3 !important;
  }

  .hint { font-size: 11px; color: #666; margin-top: 5px; line-height: 1.6; }
  .divider { border: none; border-top: 1px solid #1e2d4a; margin: 20px 0; }

  .btn-primary {
    width: 100%; padding: 13px;
    background: #4ecca3; color: #1a1a2e;
    border: none; border-radius: 6px; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity .2s; margin-top: 4px;
  }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .status {
    margin-top: 14px; padding: 11px 14px;
    border-radius: 6px; font-size: 13px; display: none; line-height: 1.5;
  }
  .status.ok   { background:#0d4a2a; color:#4ecca3; display:block; }
  .status.err  { background:#4a1a1a; color:#ff6b6b; display:block; }
  .status.info { background:#0f3460; color:#88ccff; display:block; }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid #1a1a2e; border-top-color: transparent;
    border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🖨</span>
    <h1>Delivery Print Agent</h1>
    <p>Configure uma vez — funciona para sempre</p>
  </div>

  <div class="field">
    <label for="serverUrl">URL do Servidor Backend</label>
    <input id="serverUrl" type="text" placeholder="https://api.meudelivery.com.br" autocomplete="off" />
    <p class="hint">Endereço da API do sistema (sem barra no final).</p>
  </div>

  <div class="field">
    <label for="frontendUrl">URL do Frontend <span class="optional">(opcional)</span></label>
    <input id="frontendUrl" type="text" placeholder="https://meudelivery.com.br" autocomplete="off" />
    <p class="hint">Usado para gerar QR codes de rastreio nas comandas.</p>
  </div>

  <hr class="divider" />

  <div class="field">
    <label>Código de Pareamento</label>
    <input
      id="pairingCode"
      class="code-input"
      type="text"
      maxlength="6"
      placeholder="XXXXXX"
      autocomplete="off"
      spellcheck="false"
    />
    <p class="hint">
      No painel: <strong>Configurações → Impressoras → Gerar código</strong><br>
      O código tem 6 letras e expira em 10 minutos.
    </p>
  </div>

  <button class="btn-primary" id="btnInstall">🔗 Instalar e Conectar</button>
  <div class="status" id="status"></div>
</div>

<script>
const api = window.electronAPI;

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status ' + type;
}

function setLoading(loading) {
  const btn = document.getElementById('btnInstall');
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Conectando…';
  } else {
    btn.disabled = false;
    btn.innerHTML = '🔗 Instalar e Conectar';
  }
}

document.getElementById('btnInstall').addEventListener('click', async () => {
  const serverUrl = document.getElementById('serverUrl').value.trim().replace(/\/$/, '');
  const frontendUrl = document.getElementById('frontendUrl').value.trim().replace(/\/$/, '');
  const code = document.getElementById('pairingCode').value.trim().toUpperCase();

  if (!serverUrl) {
    showStatus('Informe a URL do servidor backend.', 'err');
    document.getElementById('serverUrl').focus();
    return;
  }
  if (!serverUrl.startsWith('http')) {
    showStatus('URL deve começar com http:// ou https://', 'err');
    document.getElementById('serverUrl').focus();
    return;
  }
  if (code.length < 4) {
    showStatus('Digite o código de pareamento de 6 caracteres.', 'err');
    document.getElementById('pairingCode').focus();
    return;
  }

  setLoading(true);
  showStatus('Conectando ao servidor…', 'info');

  try {
    const result = await api.pairWithCode(serverUrl, code);

    if (!result.ok) {
      showStatus('✗ ' + result.error, 'err');
      setLoading(false);
      return;
    }

    showStatus('✓ Pareamento concluído! Iniciando agente…', 'ok');

    const existing = await api.loadConfig();
    const newCfg = {
      ...existing,
      serverUrl: result.socketUrl || serverUrl,
      frontendUrl: frontendUrl || existing.frontendUrl || '',
      token: result.token,
      storeIds: result.storeIds || [],
      companyId: result.companyId || null,
    };

    setTimeout(() => api.closeSetup(newCfg), 1500);

  } catch (e) {
    showStatus('Erro inesperado: ' + e.message, 'err');
    setLoading(false);
  }
});

// Enter em qualquer campo submete
document.querySelectorAll('input').forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btnInstall').click();
  });
});

// Filtra código: apenas alfanumérico, maiúsculo, max 6
document.getElementById('pairingCode').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase().slice(0, 6);
});

// Pré-preenche se já houver config salva
api.loadConfig().then(cfg => {
  if (cfg.serverUrl)   document.getElementById('serverUrl').value   = cfg.serverUrl;
  if (cfg.frontendUrl) document.getElementById('frontendUrl').value = cfg.frontendUrl;
});
</script>
</body>
</html>
