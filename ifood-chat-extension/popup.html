<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 340px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 14px; }
    h3 { margin: 0 0 12px; font-size: 16px; }
    label { display: block; margin-bottom: 4px; font-weight: 600; }
    input[type="text"] { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 12px; }
    .status { padding: 8px; border-radius: 4px; text-align: center; margin-bottom: 12px; font-weight: 600; font-size: 13px; }
    .status.connected { background: #d4edda; color: #155724; }
    .status.disconnected { background: #f8d7da; color: #721c24; }
    button { width: 100%; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; margin-bottom: 8px; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #0b5ed7; }
    .btn-success { background: #198754; color: #fff; }
    .btn-success:hover { background: #157347; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn-danger:hover { background: #bb2d3b; }
    .btn-outline { background: #fff; color: #333; border: 1px solid #ccc; }
    .btn-outline:hover { background: #f0f0f0; }
    .tab-section { padding: 10px; border: 1px solid #e0e0e0; border-radius: 6px; margin-bottom: 12px; background: #fafafa; }
    .tab-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #666; margin-bottom: 6px; }
    .active-tab { padding: 8px 12px; border-radius: 4px; background: #e8f5e9; border: 1px solid #a5d6a7; font-size: 13px; margin-bottom: 8px; }
    .active-tab .tab-label { font-weight: 600; color: #2e7d32; }
    .active-tab .tab-url { font-size: 11px; color: #666; word-break: break-all; }
    .no-tab { padding: 8px 12px; border-radius: 4px; background: #fff3e0; border: 1px solid #ffcc80; font-size: 13px; color: #e65100; margin-bottom: 8px; }
    .queue-info { font-size: 12px; color: #666; margin-top: 4px; }
    .checkbox-row { margin-bottom: 12px; }
    .checkbox-row label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-weight: normal; }
  </style>
</head>
<body>
  <h3>iFood Chat Extension</h3>
  <div id="statusIndicator" class="status disconnected">Desconectado</div>

  <!-- Aba ativa -->
  <div class="tab-section">
    <div class="tab-title">Aba Ativa (automação)</div>
    <div id="activeTabInfo" class="no-tab">Nenhuma aba ativada</div>
    <button class="btn-success" id="activateBtn">Ativar nesta aba</button>
    <button class="btn-danger" id="deactivateBtn" style="display:none;">Desativar aba</button>
  </div>

  <label>URL do Backend</label>
  <input type="text" id="backendUrl" placeholder="https://seudominio.com">

  <label>Token da Extensão</label>
  <input type="text" id="extensionToken" placeholder="Token gerado no sistema">

  <label>Company ID</label>
  <input type="text" id="companyId" placeholder="ID da empresa">

  <div class="checkbox-row">
    <label>
      <input type="checkbox" id="debugMode" />
      Modo Debug (preenche mas não envia)
    </label>
  </div>

  <button class="btn-primary" id="saveBtn">Salvar e Conectar</button>
  <div class="queue-info" id="queueInfo"></div>

  <script src="popup.js"></script>
</body>
</html>
